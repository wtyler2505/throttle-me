# throttle-me configuration file
# Copy to ~/.config/throttle-me/config to customize

# TTL value to set (default: 65 for iPhone)
TTL_VALUE=65

# IPv6 hop limit value
HL_VALUE=65

# DNS server for public DNS redirection (default: Cloudflare)
DNS_SERVER="1.1.1.1"

# Log level: 1=ERROR, 2=WARN, 3=INFO, 4=DEBUG
LOG_LEVEL=3

# Log file location
LOG_FILE="/tmp/throttle-me.log"

# Show confirmation dialogs before enable/disable
CONFIRM_ENABLE=true
CONFIRM_DISABLE=true

# Paths to bypass scripts
BYPASS_SCRIPT="$HOME/.local/bin/bypass-tethering"
DISABLE_SCRIPT="$HOME/.local/bin/disable-bypass-tethering"

# Dashboard/daemon settings
AUTO_ENABLE=false
MAX_SESSIONS=100
MAX_AGE_DAYS=30
INTERFACE_OVERRIDE=""
POLL_INTERVAL=5
HOTSPOT_PATTERNS="iPhone* AndroidAP* *Galaxy*"
SPEED_TEST_TIMEOUT=30
NOTIFICATION_URGENCY="normal"
